<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 48">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <!-- AK Monogram Mark -->
  <rect x="0" y="4" width="40" height="40" rx="10" fill="url(#logo-grad)"/>

  <!-- Letter A -->
  <path d="M12 34 L20 12 L28 34" stroke="#0B0F19" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="14.5" y1="27" x2="25.5" y2="27" stroke="#0B0F19" stroke-width="3.2" stroke-linecap="round"/>

  <!-- Letter K (overlapping, offset right) -->
  <line x1="24" y1="12" x2="24" y2="34" stroke="#0B0F19" stroke-width="3.2" stroke-linecap="round"/>
  <path d="M24 24 L32 12" stroke="#0B0F19" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M24 24 L33 34" stroke="#0B0F19" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Company Name -->
  <text x="52" y="23" font-family="'Plus Jakarta Sans', 'Inter', Arial, sans-serif" font-size="16" font-weight="700" fill="#F1F5F9" letter-spacing="0.5">Al Kabbani</text>
  <text x="52" y="39" font-family="'Inter', Arial, sans-serif" font-size="12" font-weight="500" fill="#94A3B8" letter-spacing="2">SOLUTIONS</text>
</svg>
